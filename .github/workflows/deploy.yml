name: Deploy TikTok Shuffle

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /var/www/tiktokshuffle
            git pull origin main
            npm install
            npm run build
            cd server
            npm install --omit=dev
            pm2 restart tiktok-shuffle
